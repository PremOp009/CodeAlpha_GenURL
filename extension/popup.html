<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GenURL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.5 6L10.5 18M7.5 8.5L3 12L7.5 15.5M16.5 8.5L21 12L16.5 15.5" stroke="url(#brandGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="brandGrad" x1="3" y1="12" x2="21" y2="12" gradientUnits="userSpaceOnUse">
              <stop stop-color="#E4D6A9"/>
              <stop offset="1" stop-color="#995F2F"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">Gen<span class="logo-accent">URL</span></span>
    </div>
    <div id="status-dot" class="status-dot" title="API Status"></div>
  </header>

  <!-- ── Main Card ───────────────────────────────── -->
  <main class="card">
    <!-- URL Input -->
    <div class="field-group">
      <label class="field-label" for="url-input">URL to Shorten</label>
      <div class="input-wrapper">
        <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <input
          type="url"
          id="url-input"
          class="input"
          placeholder="https://example.com/very-long-url..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- Custom Alias Input -->
    <div class="field-group">
      <label class="field-label" for="alias-input">
        Custom Alias
        <span class="field-optional">optional</span>
      </label>
      <div class="input-wrapper">
        <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <input
          type="text"
          id="alias-input"
          class="input"
          placeholder="my-link"
          maxlength="30"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- Shorten Button -->
    <button id="shorten-btn" class="btn-primary">
      <span id="btn-text">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-right:6px;vertical-align:-2px">
          <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Shorten URL
      </span>
      <span id="btn-spinner" class="spinner hidden"></span>
    </button>

    <!-- Result Box -->
    <div id="result-box" class="result-box hidden">
      <div class="result-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <polyline points="20 6 9 17 4 12" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="result-label">Shortened!</span>
        <span id="already-badge" class="badge-existing hidden">already existed</span>
      </div>
      <div class="result-url-row">
        <span id="result-url" class="result-url"></span>
        <button id="copy-btn" class="btn-copy" title="Copy to clipboard">
          <svg id="copy-icon" width="13" height="13" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
          </svg>
          <svg id="check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" class="hidden">
            <polyline points="20 6 9 17 4 12" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="result-meta">
        <span id="clicks-badge" class="meta-chip">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style="margin-right:3px;vertical-align:-1px">
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="2"/>
            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span id="clicks-count">0</span> clicks
        </span>
        <span id="code-badge" class="meta-chip">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style="margin-right:3px;vertical-align:-1px">
            <polyline points="16 18 22 12 16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="8 6 2 12 8 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="short-code-label"></span>
        </span>
      </div>
    </div>

    <!-- Error Box -->
    <div id="error-box" class="error-box hidden">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <circle cx="12" cy="12" r="10" stroke="#f87171" stroke-width="2"/>
        <line x1="12" y1="8" x2="12" y2="12" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="16" x2="12.01" y2="16" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span id="error-text"></span>
    </div>
  </main>

  <!-- ── Recent Links ─────────────────────────────── -->
  <section class="history-section">
    <div class="history-header">
      <span class="history-title">Recent Links</span>
      <button id="refresh-btn" class="btn-icon" title="Refresh history">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <polyline points="23 4 23 10 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="history-list" class="history-list">
      <div class="history-empty">Loading recent links...</div>
    </div>
  </section>

  <!-- ── Footer ──────────────────────────────────── -->
  <footer class="footer">
    <a href="http://localhost:5000/health" target="_blank" id="footer-api-link" class="footer-link">API</a>
    <span class="footer-sep">·</span>
    <span class="footer-text">GenURL v1.0</span>
    <span class="footer-sep">·</span>
    <a href="http://localhost:5173" target="_blank" id="footer-dash-link" class="footer-link">Dashboard</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
